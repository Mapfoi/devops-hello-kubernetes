name: Deploy to Kubernetes

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: k8s-deploy
  cancel-in-progress: false

env:
  TF_VERSION: "1.5.0"
  HELM_VERSION: "v3.14.0"
  APP_NAMESPACE: devops-app
  MONITORING_NAMESPACE: monitoring

jobs:

################################################################################
# BUILD & PUSH DOCKER IMAGE
################################################################################

  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        id: image
        run: |
          TAG="${{ github.sha }}"
          IMAGE="${{ secrets.DOCKER_USERNAME }}/devops-hello:${TAG}"

          docker build -t "$IMAGE" ./app
          docker tag "$IMAGE" "${{ secrets.DOCKER_USERNAME }}/devops-hello:latest"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/devops-hello:latest"

################################################################################
# TERRAFORM — Managed Kubernetes + PostgreSQL
################################################################################

  infrastructure:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      cluster_id: ${{ steps.outputs.outputs.cluster_id }}
      db_host: ${{ steps.outputs.outputs.db_host }}
      db_port: ${{ steps.outputs.outputs.db_port }}
      db_name: ${{ steps.outputs.outputs.db_name }}
      db_user: ${{ steps.outputs.outputs.db_user }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write authorized key (key.json)
        env:
          YC_SERVICE_ACCOUNT_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_JSON }}
        run: |
          # Official auth: path to key.json via YC_SERVICE_ACCOUNT_KEY_FILE
          # https://yandex.cloud/docs/terraform/authentication#service-account-key
          printenv YC_SERVICE_ACCOUNT_JSON > "$RUNNER_TEMP/key.json"
          chmod 600 "$RUNNER_TEMP/key.json"
          echo "YC_SERVICE_ACCOUNT_KEY_FILE=$RUNNER_TEMP/key.json" >> "$GITHUB_ENV"

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Authenticate YC CLI
        run: |
          yc config profile create github-actions || true
          yc config set service-account-key "$YC_SERVICE_ACCOUNT_KEY_FILE"
          yc config set cloud-id "${{ secrets.YC_CLOUD_ID }}"
          yc config set folder-id "${{ secrets.YC_FOLDER_ID }}"

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: terraform init -reconfigure

      # If cloud resources exist but state is empty (partial previous apply), adopt them.
      - name: Import existing resources into state (if any)
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: |
          set +e

          TF_VARS=(
            -var="yc_cloud_id=${{ secrets.YC_CLOUD_ID }}"
            -var="yc_folder_id=${{ secrets.YC_FOLDER_ID }}"
            -var="db_password=${{ secrets.DB_PASSWORD }}"
          )

          import_if_missing() {
            local address="$1"
            local id="$2"
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              return 0
            fi
            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Already in state: $address"
              return 0
            fi
            echo "Importing $address <- $id"
            terraform import "${TF_VARS[@]}" "$address" "$id"
          }

          SG_MAIN_ID=$(yc vpc security-group list --format json 2>/dev/null \
            | jq -r '.[] | select(.name=="devops-k8s-main-sg") | .id' | head -n1)
          SG_NODES_ID=$(yc vpc security-group list --format json 2>/dev/null \
            | jq -r '.[] | select(.name=="devops-k8s-nodes-sg") | .id' | head -n1)
          SG_PG_ID=$(yc vpc security-group list --format json 2>/dev/null \
            | jq -r '.[] | select(.name=="devops-pgsql-sg") | .id' | head -n1)
          DB_ID=$(yc managed-postgresql cluster get devops-db-cluster --format json 2>/dev/null | jq -r '.id')
          CLUSTER_ID=$(yc managed-kubernetes cluster get devops-k8s-cluster --format json 2>/dev/null | jq -r '.id')

          import_if_missing "yandex_vpc_security_group.k8s_main" "$SG_MAIN_ID"
          import_if_missing "yandex_vpc_security_group.k8s_nodes" "$SG_NODES_ID"
          import_if_missing "yandex_vpc_security_group.pgsql" "$SG_PG_ID"
          import_if_missing "yandex_mdb_postgresql_cluster.app_db" "$DB_ID"

          if [ -n "$DB_ID" ] && [ "$DB_ID" != "null" ]; then
            import_if_missing "yandex_mdb_postgresql_user.app_user" "${DB_ID}:user1"
            import_if_missing "yandex_mdb_postgresql_database.app_db" "${DB_ID}:db1"
          fi

          import_if_missing "yandex_kubernetes_cluster.app" "$CLUSTER_ID"

          if [ -n "$CLUSTER_ID" ] && [ "$CLUSTER_ID" != "null" ]; then
            NG_ID=$(yc managed-kubernetes node-group list --cluster-id "$CLUSTER_ID" --format json 2>/dev/null \
              | jq -r '.[] | select(.name=="devops-k8s-workers") | .id' | head -n1)
            import_if_missing "yandex_kubernetes_node_group.workers" "$NG_ID"
          fi

          set -e
          echo "Import step finished"
          terraform state list || true

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: |
          terraform apply \
            -auto-approve \
            -var="yc_cloud_id=${{ secrets.YC_CLOUD_ID }}" \
            -var="yc_folder_id=${{ secrets.YC_FOLDER_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Get Terraform Outputs
        id: outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
        run: |
          echo "cluster_id=$(terraform output -raw cluster_id)" >> "$GITHUB_OUTPUT"
          echo "db_host=$(terraform output -raw db_host)" >> "$GITHUB_OUTPUT"
          echo "db_port=$(terraform output -raw db_port)" >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw db_name)" >> "$GITHUB_OUTPUT"
          echo "db_user=$(terraform output -raw db_user)" >> "$GITHUB_OUTPUT"

################################################################################
# DEPLOY TO KUBERNETES
################################################################################

  deploy:
    needs:
      - build
      - infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_JSON }}
        run: |
          printenv YC_SERVICE_ACCOUNT_JSON > "$RUNNER_TEMP/key.json"
          chmod 600 "$RUNNER_TEMP/key.json"
          yc config profile create github-actions || true
          yc config set service-account-key "$RUNNER_TEMP/key.json"
          yc config set cloud-id "${{ secrets.YC_CLOUD_ID }}"
          yc config set folder-id "${{ secrets.YC_FOLDER_ID }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Get kubeconfig
        run: |
          # Prefer dynamic credentials from the cluster created by Terraform.
          # Optional secret YC_KUBECONFIG can override if set.
          if [ -n "${{ secrets.YC_KUBECONFIG }}" ] && [ "${{ secrets.YC_KUBECONFIG }}" != "" ]; then
            mkdir -p "$HOME/.kube"
            printf '%s\n' "${{ secrets.YC_KUBECONFIG }}" > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            yc managed-kubernetes cluster get-credentials \
              "${{ needs.infrastructure.outputs.cluster_id }}" \
              --external \
              --force
          fi

          kubectl cluster-info
          kubectl get nodes

      - name: Install Ingress NGINX (LoadBalancer)
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --values helm/ingress-nginx/values.yaml \
            --wait \
            --timeout 10m

      - name: Create namespace and ConfigMap
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml

      - name: Create database Secret from Terraform outputs
        run: |
          kubectl -n "${{ env.APP_NAMESPACE }}" create secret generic app-db-secret \
            --from-literal=DB_HOST="${{ needs.infrastructure.outputs.db_host }}" \
            --from-literal=DB_PORT="${{ needs.infrastructure.outputs.db_port }}" \
            --from-literal=DB_NAME="${{ needs.infrastructure.outputs.db_name }}" \
            --from-literal=DB_USER="${{ needs.infrastructure.outputs.db_user }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render and apply Deployment
        run: |
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"

          sed \
            -e "s|DOCKER_USERNAME/devops-hello:latest|${DOCKER_USERNAME}/devops-hello:${IMAGE_TAG}|g" \
            kubernetes/deployment.yaml | kubectl apply -f -

          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/ingress.yaml
          kubectl apply -f kubernetes/hpa.yaml

      - name: Wait for rolling update
        run: |
          kubectl -n "${{ env.APP_NAMESPACE }}" rollout status deployment/app --timeout=300s
          kubectl -n "${{ env.APP_NAMESPACE }}" get pods
          kubectl -n "${{ env.APP_NAMESPACE }}" get svc,ingress,hpa

      - name: Install Prometheus Operator (kube-prometheus-stack)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          kubectl apply -f kubernetes/monitoring/namespace.yaml

          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace "${{ env.MONITORING_NAMESPACE }}" \
            --values helm/prometheus/values.yaml \
            --wait \
            --timeout 10m

          # Wait for CRDs then apply ServiceMonitor
          kubectl apply -f kubernetes/monitoring/servicemonitor.yaml

      - name: Install Grafana
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

          helm upgrade --install grafana grafana/grafana \
            --namespace "${{ env.MONITORING_NAMESPACE }}" \
            --values helm/grafana/values.yaml \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          INGRESS_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

          echo "======================================"
          echo "DEPLOYMENT COMPLETED"
          echo "======================================"
          echo ""
          echo "Image: ${{ needs.build.outputs.image }}"
          echo "Cluster: ${{ needs.infrastructure.outputs.cluster_id }}"
          echo "DB Host: ${{ needs.infrastructure.outputs.db_host }}"
          echo ""
          if [ -n "$INGRESS_IP" ]; then
            echo "Application:  http://${INGRESS_IP}/"
            echo "Grafana:      http://${INGRESS_IP}/grafana  (admin / admin)"
          else
            echo "Ingress IP is provisioning. Check later:"
            echo "  kubectl -n ingress-nginx get svc ingress-nginx-controller"
          fi
          echo ""
          echo "Pods:"
          kubectl -n "${{ env.APP_NAMESPACE }}" get pods -o wide
          echo "======================================"
