name: Start Environment

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Authenticate Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_JSON }}
        run: |
          printenv YC_SERVICE_ACCOUNT_JSON > "$RUNNER_TEMP/key.json"
          chmod 600 "$RUNNER_TEMP/key.json"
          yc config profile create github-actions || true
          yc config set service-account-key "$RUNNER_TEMP/key.json"
          yc config set cloud-id "${{ secrets.YC_CLOUD_ID }}"
          yc config set folder-id "${{ secrets.YC_FOLDER_ID }}"

      - name: Start Managed Kubernetes cluster
        run: |
          CLUSTER_ID=$(yc managed-kubernetes cluster get devops-k8s-cluster --format json | jq -r '.id')
          echo "Starting cluster $CLUSTER_ID"
          yc managed-kubernetes cluster start "$CLUSTER_ID"

      - name: Start Managed PostgreSQL cluster
        run: |
          DB_ID=$(yc managed-postgresql cluster get devops-db-cluster --format json | jq -r '.id')
          echo "Starting PostgreSQL $DB_ID"
          yc managed-postgresql cluster start "$DB_ID" || true

      - name: Verify cluster status
        run: |
          for i in $(seq 1 30); do
            STATUS=$(yc managed-kubernetes cluster get devops-k8s-cluster --format json | jq -r '.status')
            echo "Cluster status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              exit 0
            fi
            sleep 20
          done
          echo "Cluster did not become RUNNING in time"
          exit 1
