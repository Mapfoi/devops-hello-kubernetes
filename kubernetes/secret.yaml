# Template secret — real values are injected by CI/CD from Terraform outputs
# and GitHub Secrets. Do not commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: devops-app
  labels:
    app: devops-hello
type: Opaque
stringData:
  DB_HOST: "REPLACE_DB_HOST"
  DB_PORT: "6432"
  DB_NAME: "db1"
  DB_USER: "user1"
  DB_PASSWORD: "REPLACE_DB_PASSWORD"
